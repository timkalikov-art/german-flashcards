<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== TOP BAR ===== -->
<header class="topbar">
  <button id="menuBtn" class="menu-btn">☰</button>
</header>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar" id="sidebar">

  <h3>Меню</h3>

  <!-- импорт -->
  <label class="file-upload">
    <input type="file" id="fileInput" accept=".json">
    <div class="file-btn">📂 Выбрать файл</div>
    <div id="fileName">Файл не выбран</div>
  </label>

  <!-- уровень -->
  <div class="menu-section">
    <label>Уровень</label>
    <select id="levelSelect">
      <option value="A1">A1</option>
      <option value="A2">A2</option>
      <option value="B1">B1</option>
      <option value="B2">B2</option>
      <option value="C1">C1</option>
    </select>
  </div>

  <!-- тема -->
  <div class="menu-section">
    <label>Тема</label>
    <select id="topicSelect"></select>
  </div>

</div>

<!-- overlay должен быть СНАРУЖИ -->
<div class="overlay" id="overlay"></div>


<!-- ===== MAIN ===== -->
<main class="container">

  <div class="card" id="card">
    <div class="card-inner" id="cardInner">

      <div class="card-front">
        <div class="word" id="word">Загрузите слова</div>
      </div>

      <div class="card-back">
        <div class="translation" id="translation"></div>
        <div class="example" id="example"></div>
      </div>

    </div>
  </div>

  <div class="buttons">
    <button id="knowBtn" class="primary">Знаю</button>
    <button id="repeatBtn" class="secondary-btn">Повторить</button>
  </div>

  <p id="stats">0 / 0</p>

  <button id="openStats" class="secondary-btn">Статистика</button>

</main>

<!-- ===== MODAL ===== -->
<div class="modal" id="statsModal">
  <div class="modal-content">
    <h2>Статистика</h2>
    <p id="modalStats"></p>
    <button id="closeStats" class="secondary-btn">Закрыть</button>
  </div>
</div>

<!-- ===== THEME ===== -->
<button id="themeToggle" class="theme-toggle">☀️</button>

<script src="script.js"></script>

</body>
</html>
